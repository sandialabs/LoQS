# This workflow runs a full test suite on the LoQS package

name: LoQS Tests + Docs

on:
  push:
  pull_request:
  workflow_dispatch: # Allow manual running from GitHub

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest] # No Mac for speed
        python-version: ['3.11', '3.12']
        loqs-optional: ["all"]
    uses: ./.github/workflows/reusable-loqs.yml
    name: Run LoQS tests
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      loqs-optional: ${{ matrix.loqs-optional }}
  
  docs:
    runs-on: ubuntu-latest
    needs: unit-tests
    # Run only on PRs or pushes into main (temp bugfix-actions)
    if: >
      ${{
        (github.event_name == 'pull_request' && github.base_ref == 'main') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/bugfix-actions')
      }}
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r docs/requirements.txt

    - name: Build Jupyter Book
      run: |
        jupyter-book build docs
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: book-html
        path: docs/_build/html
