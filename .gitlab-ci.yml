stages:
  - lint
  - test
  - pages

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Don't wipe cache or tox (cuts down on test runtime)
  GIT_CLEAN_FLAGS: -ffdx -e .cache/ -e .tox/

cache:
  paths:
    - .cache/pip

default:
  before_script:
  - . /data/modules/easybuild/software/Anaconda3/2020.11/etc/profile.d/conda.sh
  - conda activate gitlab-runner-loqs

Lint and type check:
  stage: lint
  image: python:3.11
  allow_failure: true
  script:
    - pip install ".[test]"
    - tox -e lint,type

Run unit tests:
  stage: test
  image: python:3.11
  script:
    - pip install ".[test]"
    - tox -e py311
  coverage: '/\d+(?:\.\d+)?\%$/'

Build documentation:
  stage: pages
  image: python:3.11
  script:
    - pip install ".[docs,pygsti,quantumsim]"
    - jupyter-book build docs
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
