stages:
  - test
  - docs

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - source /home/gitlab-runner/.bashrc
  - conda activate gitlab-runner-loqs
  - pip install ".[all]"

Run unit tests:
  stage: test
  image: python:3.11
  allow_failure: true
  script:
    - tox run

Build documentation:
  stage: docs
  image: python:3.11
  script:
    - jupyter-book build docs
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
