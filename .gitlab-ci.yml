stages:
  - test
  - docs

include:
  - template: Security/SAST.gitlab-ci.yml

default:
  tags:
    - do.small

Run unit tests:
  stage: test
  image: quay.sandia.gov/dice/rhel8-minimal-python
  allow_failure: true
  before_script:
    - python --version; pip --version # For debugging
    - pip install ".[test]"
  script:
    - tox run

Build documentation:
  stage: docs
  image: quay.sandia.gov/dice/rhel8-minimal-python
  before_script:
    - pip install -e ".[docs,pygsti,quantumsim]"
  script:
    - PYTHONPATH=. jupyter-book build docs
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
