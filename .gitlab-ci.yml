stages:
  - test
  - docs

include:
  - template: Security/SAST.gitlab-ci.yml

default:
  tags:
    - do.small

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

Run unit tests:
  stage: test
  image: quay.sandia.gov/dice/rhel8-minimal-python
  before_script:
    - pip install ".[test]"
  allow_failure: true
  script:
    - tox run

Build documentation:
  stage: docs
  image: quay.sandia.gov/dice/rhel8-minimal-python
  before_script:
    - pip install ".[docs,pygsti,quantumsim]"
    - sed -i 's/cache$/off/' docs/_config.yml # Turn off notebook running for now, broken in pipeline
  script:
    - jupyter-book build docs
    - mv docs/_build/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
