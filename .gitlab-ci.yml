stages:
  - lint
  - test
  - docs

include:
  - template: Security/SAST.gitlab-ci.yml

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  # https://pip.pypa.io/en/stable/topics/caching/
  cache:
    paths:
      - .cache/pip
  tags:
    - do.small

Run unit tests:
  stage: test
  image: quay.sandia.gov/dice/rhel8-minimal-python
  allow_failure: true
  before_script:
    - python --version; pip --version # For debugging
    - pip install ".[pygsti,quantumsim,test]"
  script:
    - tox run

# Something is being blocked on Sandia's runners
# Return to this when using different runners
Build documentation:
  stage: docs
  image: quay.sandia.gov/dice/rhel8-minimal-python
  before_script:
    - pip install ".[docs,pygsti,quantumsim]"
  script:
    - jupyter-book build docs
    - mv docs/_build/html/ ../public/
  artifacts:
    paths:
      - public
    expire_in: never
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
