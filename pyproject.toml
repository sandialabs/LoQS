[project]
name = "loqs"
version = "1.0-alpha"
requires-python = ">=3.8"
authors = [
    {name = "Kenneth Rudinger", email = "kmrudin@sandia.gov"},
    {name = "Stefan Seritan", email = "sserita@sandia.gov"},
    {name = "Megan Dahlhauser"},
    {name = "Julie Campos"},
    {name = "Mario Morford-Oberst"},
]
maintainers = [
    {name = "Kenneth Rudinger", email = "kmrudin@sandia.gov"},
    {name = "Stefan Seritan", email = "sserita@sandia.gov"}
]
description = "Logical Qubit Simulator (LoQS)"
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "Programming Language :: Python"
]

[project.optional-dependencies]
dev = [
    "pre-commit",
    "black",
    "flake8"
]
docs = [
    "sphinx",
    "jupyter-book"
]
quantumsim = ["quantumsim==0.2.0"]
pygsti = ["pygsti[extensions]>=0.9.12"]
test = ["pytest"]
all = ["loqs[dev,docs,quantumsim,pygsti,test]"]

[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[tool.black]
line-length = 79 # Match PEP8
include = '\.pyi?$'
force-exclude = '''
/(
      \.git
    | \.pytest_cache
    | \.vscode
    | docs
    | venv
)/
'''

[tool.pyright]
exclude = [
    "**/pycache",
    "**/venv"
]