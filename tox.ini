[tox]
requires =
    tox>=4
env_list = clean,lint,type,py311,report

[testenv]
description = run unit tests
deps =
    mock>=5
    numpy<2
    pytest>=8
    pytest-cov>=5
    pygsti>=0.9.12
    quantumsim==0.2.0
ignore_errors = True
commands =
    pytest loqs
    pytest --cov=loqs --cov-branch --cov-report term-missing tests

[testenv:lint]
description = run linters
skip_install = true
deps =
    black>=24
    flake8>=7
commands =
    black --check {posargs:loqs}
    flake8 {posargs:loqs}

[testenv:type]
description = run type checks
deps =
    mypy>=1
commands =
    mypy {posargs:loqs}

[testenv:report]
description = generate a coverage report
deps = coverage
skip_install = true
commands =
    coverage report
    coverage html

[testenv:clean]
description = clean coverage between runs
deps = coverage
skip_install = true
commands = coverage erase
